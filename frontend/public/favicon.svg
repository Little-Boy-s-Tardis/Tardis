<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
  <!-- Lamp Glow -->
  <circle cx="24" cy="5" r="4" fill="#FBBF24" opacity="0.6" />
  
  <!-- Lamp -->
  <rect x="22" y="5" width="4" height="4" rx="1" fill="#FBBF24" stroke="#111827" stroke-width="2.5" />
  
  <!-- Roof cap -->
  <path d="M12 13 L24 9 L36 13 Z" fill="#1E40AF" stroke="#111827" stroke-width="2.5" stroke-linejoin="round" />
  
  <!-- Sign Board ("POLICE BOX") -->
  <rect x="14" y="13" width="20" height="4" fill="#111827" stroke="#111827" stroke-width="2.5" />
  <!-- Sign text lines -->
  <line x1="16" y1="15" x2="32" y2="15" stroke="#FFFFFF" stroke-width="1" />
  
  <!-- Main Body -->
  <rect x="14" y="17" width="20" height="26" fill="#2563EB" stroke="#111827" stroke-width="2.5" />
  
  <!-- Left Window -->
  <rect x="16.5" y="19.5" width="6" height="5" fill="#FEF08A" stroke="#111827" stroke-width="2" />
  <line x1="19.5" y1="19.5" x2="19.5" y2="24.5" stroke="#111827" stroke-width="1" />
  <line x1="16.5" y1="22" x2="22.5" y2="22" stroke="#111827" stroke-width="1" />
  
  <!-- Right Window -->
  <rect x="25.5" y="19.5" width="6" height="5" fill="#FEF08A" stroke="#111827" stroke-width="2" />
  <line x1="28.5" y1="19.5" x2="28.5" y2="24.5" stroke="#111827" stroke-width="1" />
  <line x1="25.5" y1="22" x2="31.5" y2="22" stroke="#111827" stroke-width="1" />
  
  <!-- Door panels (Left side) -->
  <rect x="16.5" y="27" width="6" height="6" fill="#1E40AF" stroke="#111827" stroke-width="2" />
  <rect x="16.5" y="35" width="6" height="6" fill="#1E40AF" stroke="#111827" stroke-width="2" />
  
  <!-- Door panels (Right side) -->
  <rect x="25.5" y="27" width="6" height="6" fill="#1E40AF" stroke="#111827" stroke-width="2" />
  <rect x="25.5" y="35" width="6" height="6" fill="#1E40AF" stroke="#111827" stroke-width="2" />
</svg>